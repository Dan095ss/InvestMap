{% extends "admin/_base.html" %}
{% block title %}{% if project %}Редактирование{% else %}Новый проект{% endif %} — InvestMap{% endblock %}

{% block admin_content %}
<h1>{% if project %}Редактировать проект{% else %}Новый проект{% endif %}</h1>

<form method="post" class="form-stack" style="max-width:none;">
    <label><span>Название</span>
        <input type="text" name="title" required value="{{ project.title if project else '' }}">
    </label>
    <label><span>Краткое описание</span>
        <input type="text" name="short_description" required maxlength="300" value="{{ project.short_description if project else '' }}">
    </label>
    <label><span>Подробное описание</span>
        <textarea name="description" rows="6" required>{{ project.description if project else '' }}</textarea>
    </label>
    <label><span>Цель</span>
        <textarea name="goal" rows="2">{{ project.goal if project else '' }}</textarea>
    </label>

    <div class="form-row-2">
        <label><span>Тип</span>
            <select name="type" required>
                {% for code, label in PROJECT_TYPES %}
                    <option value="{{ code }}" {% if project and project.type == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>
        <label><span>Статус</span>
            <select name="status" required>
                {% for code, label in PROJECT_STATUSES %}
                    <option value="{{ code }}" {% if project and project.status == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <div class="form-row-2">
        <label><span>Район</span>
            <select name="district" required>
                {% for d in DISTRICTS %}
                    <option value="{{ d }}" {% if project and project.district == d %}selected{% endif %}>{{ d }}</option>
                {% endfor %}
            </select>
        </label>
        <label><span>Адрес</span>
            <input type="text" name="address" value="{{ project.address if project else '' }}">
        </label>
    </div>

    <div class="form-row-2">
        <label><span>Широта (lat)</span>
            <input type="number" step="0.000001" name="lat" required value="{{ project.lat if project else 43.1155 }}">
        </label>
        <label><span>Долгота (lng)</span>
            <input type="number" step="0.000001" name="lng" required value="{{ project.lng if project else 131.8855 }}">
        </label>
    </div>

    <div class="form-row-2">
        <label><span>Начало</span>
            <input type="date" name="start_date" value="{{ project.start_date.isoformat() if project and project.start_date else '' }}">
        </label>
        <label><span>Завершение</span>
            <input type="date" name="end_date" value="{{ project.end_date.isoformat() if project and project.end_date else '' }}">
        </label>
    </div>

    <div class="form-row-2">
        <label><span>Бюджет, ₽</span>
            <input type="number" name="budget" value="{{ project.budget if project and project.budget else '' }}">
        </label>
        <label><span>Ответственные</span>
            <input type="text" name="responsible" value="{{ project.responsible if project else '' }}">
        </label>
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn--primary">Сохранить</button>
        <a href="{{ url_for('admin.projects_list') }}" class="btn btn--ghost">Отмена</a>
    </div>
</form>
{% endblock %}
