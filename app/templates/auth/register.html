{% extends "base.html" %}
{% block title %}Регистрация — InvestMap{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Создать аккаунт</h1>
        <p class="auth-card__lead">Подпишитесь на проекты, оставляйте комментарии, поддерживайте инициативы.</p>

        <form method="post">
            <div class="form-row">
                <label for="name">Имя</label>
                <input id="name" type="text" name="name" value="{{ name or '' }}" required autofocus>
            </div>
            <div class="form-row">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" value="{{ email or '' }}" required>
            </div>
            <div class="form-row">
                <label for="password">Пароль</label>
                <input id="password" type="password" name="password" minlength="6" required>
                <span class="form-hint">Не короче 6 символов.</span>
            </div>
            <div class="form-row">
                <label for="password2">Повторите пароль</label>
                <input id="password2" type="password" name="password2" minlength="6" required>
            </div>
            <button class="btn btn--primary btn--block" type="submit">Создать аккаунт</button>
        </form>

        <div class="divider"></div>
        <p class="text-center muted">
            Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
