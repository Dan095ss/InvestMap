services:
  web:
    build: .
    image: investmap:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database
      - investmap_db:/app/instance
      # Persist user-uploaded files
      - investmap_uploads:/app/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  investmap_db:
  investmap_uploads:
